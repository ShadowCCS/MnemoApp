# Builds Velopack installers per RID.
# GitHub Release assets remain user-facing only (installer/portable binaries).
# Update-feed files are published as a separate workflow artifact.
name: Release packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            mainexe: Mnemo.UI.exe
          - rid: linux-x64
            os: ubuntu-latest
            mainexe: Mnemo.UI
          - rid: osx-x64
            # macos-13 is largely retired on GHA; cross-publish osx-x64 from a current image.
            os: macos-14
            mainexe: Mnemo.UI
          - rid: osx-arm64
            os: macos-14
            mainexe: Mnemo.UI
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore vpk tool
        run: dotnet tool restore

      # Tags are v1.2.3; NuGet / MSBuild Version must be semver without the leading v.
      - name: Resolve semver from tag
        id: version
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: echo "semver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish Mnemo.UI/Mnemo.UI.csproj -c Release -r ${{ matrix.rid }} --self-contained true
          -p:Version=${{ steps.version.outputs.semver }}
          -p:AssemblyInformationalVersion=${{ github.ref_name }}
          -o publish

      - name: Pack (Velopack)
        run: >
          dotnet vpk pack
          --packId Mnemo.Desktop
          --packTitle Mnemo
          --packAuthors Mnemo
          --packVersion ${{ steps.version.outputs.semver }}
          --packDir publish
          --mainExe ${{ matrix.mainexe }}
          -o vpk-out
          --channel stable

      - name: Portable zip (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: Compress-Archive -Path "publish/*" -DestinationPath "vpk-out/Mnemo-Portable-${{ matrix.rid }}.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: vpk-${{ matrix.rid }}
          path: vpk-out/**

  upload-to-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vpk-*
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/**/Mnemo-Portable-*.zip
            artifacts/**/*.AppImage
            artifacts/**/*Setup.exe
            artifacts/**/*Setup.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-update-feed-artifact:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vpk-*
          merge-multiple: true

      - name: Upload update feed files
        uses: actions/upload-artifact@v4
        with:
          name: update-feed-stable-${{ github.ref_name }}
          path: |
            artifacts/**/*.nupkg
            artifacts/**/RELEASES-*
            artifacts/**/releases.*.json
            artifacts/**/assets.*.json
          if-no-files-found: error

  publish-update-feed-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vpk-*
          merge-multiple: true

      - name: Build update feed site payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p feed/updates/stable
          shopt -s globstar nullglob
          for f in artifacts/**/*.nupkg artifacts/**/RELEASES-* artifacts/**/releases.*.json artifacts/**/assets.*.json; do
            cp "$f" feed/updates/stable/
          done
          ls -la feed/updates/stable

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: feed

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
